builder_story: "Built XcrowHub solo as a Web3 founder and AI developer to fix
  the trust gap in P2P crypto deals. Designed a zero-fee private escrow +
  low-fee marketplace layer with wallet-only auth and human-reviewed proof
  disputes (instead of blind smart-contract releases or centralized platforms).
  Full end-to-end build: React + TypeScript + Tailwind frontend, Supabase
  backend + Edge Functions, custom Node.js custody signer, Nimiq Pay Mini App
  SDK integration, dual support for NIM and USDT (Polygon). Launched with clear
  positioning around safer, private Web3 transactions. No KYC, no passwords,
  on-chain finality with real human oversight for disputes."
