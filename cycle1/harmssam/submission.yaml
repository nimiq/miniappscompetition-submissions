tagline: Sign together. Prove forever.
description: Verilock lets landlords, freelancers, and small teams sign PDF
  agreements with Nimiq wallet-backed signatures, then permanently anchor the
  document fingerprint on-chain. Your PDF never leaves your device - anyone with
  a copy can verify it matches the sealed record.
