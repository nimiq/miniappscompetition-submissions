builder_story: "I built VeriLock after seeing how rental and freelance
  agreements get disputed months later - with no easy way to prove everyone
  signed the same document. Existing e-sign tools store your PDFs on their
  servers and charge monthly fees. VeriLock takes a different approach:
  fingerprint the PDF locally, collect wallet-backed signatures from each party,
  and anchor the final hash on the Nimiq blockchain with a single seal
  transaction. The file stays on your device, but the proof is permanent and
  publicly verifiable. I used Cursor and Grok to ship the full stack - React
  mini app, Express API, SQLite on Railway - in time for the competition."
